services:
  - type: web
    name: hg-crm
    runtime: php
    buildCommand: bash .render-build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: "HG CRM"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:bwH9H4AOtVCI4K6MKTn7cm2DyLJ79Jqj1XzBP2bLLV0=
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
